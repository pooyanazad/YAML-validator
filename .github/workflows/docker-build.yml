name: Docker Build and Push

on:
  schedule:
    - cron: '00 00 1 * *'
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write
  packages: write

env:
  REGISTRY: docker.io
  IMAGE_NAME: pooyanazad/yaml-checker
  TEST_IMAGE: yaml-checker:ci

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── 1. SETUP ────────────────────────────────────────────────────────────────
  setup:
    name: 🔧 Setup
    runs-on: ubuntu-latest
    outputs:
      version:    ${{ steps.version.outputs.version }}
      latest_tag: ${{ steps.version.outputs.latest_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Print current time
        run: |
          echo "Current UTC time: $(date -u)"
          echo "Triggered by: ${{ github.event_name }}"

      - name: Generate version number
        id: version
        run: |
          git fetch --tags
          DATE=$(date +%Y%m%d)
          MAJOR="3"
          PATCH="0"

          LATEST_TAG=$(git tag -l "v${MAJOR}.*.${PATCH}-*" | sort -V | tail -n 1)

          if [ -z "$LATEST_TAG" ]; then
            MINOR_VERSION=0
          else
            MINOR_VERSION=$(echo "$LATEST_TAG" | sed "s/v${MAJOR}\.\([0-9]*\)\.${PATCH}-.*/\1/")
            MINOR_VERSION=$((MINOR_VERSION + 1))
            while git tag -l "v${MAJOR}.${MINOR_VERSION}.${PATCH}-${DATE}" | grep -q "v${MAJOR}.${MINOR_VERSION}.${PATCH}-${DATE}"; do
              MINOR_VERSION=$((MINOR_VERSION + 1))
            done
          fi

          VERSION="v${MAJOR}.${MINOR_VERSION}.${PATCH}-${DATE}"
          echo "version=${VERSION}"       >> $GITHUB_OUTPUT
          echo "latest_tag=${LATEST_TAG}" >> $GITHUB_OUTPUT
          echo "✅ Next version: ${VERSION}"
          echo "📌 Previous tag: ${LATEST_TAG}"

  # ── 2. BUILD ─────────────────────────────────────────────────────────────────
  build:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: ${{ env.TEST_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save image as artifact
        run: |
          docker save ${{ env.TEST_IMAGE }} | gzip > image.tar.gz
          echo "Image saved — size: $(du -sh image.tar.gz | cut -f1)"

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar.gz
          retention-days: 1

  # ── 3. TEST ──────────────────────────────────────────────────────────────────
  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker image
        run: docker load < image.tar.gz

      - name: Single clean file
        run: |
          docker run --rm -v "${{ github.workspace }}:/data" \
            ${{ env.TEST_IMAGE }} /data/tests/test3_clean.yaml

      - name: Single file with issues
        run: |
          docker run --rm -v "${{ github.workspace }}:/data" \
            ${{ env.TEST_IMAGE }} /data/tests/test1_issues.yaml || true

      - name: Security scan
        run: |
          docker run --rm -v "${{ github.workspace }}:/data" \
            ${{ env.TEST_IMAGE }} /data/tests/security_test1.yaml || true

      - name: Multi-file scan
        run: |
          docker run --rm -v "${{ github.workspace }}:/data" \
            ${{ env.TEST_IMAGE }} \
            /data/tests/test3_clean.yaml /data/tests/test1_issues.yaml || true

      - name: Directory scan
        run: |
          docker run --rm -v "${{ github.workspace }}:/data" \
            ${{ env.TEST_IMAGE }} /data/tests/ || true

      - name: Flags — help and version
        run: |
          docker run --rm ${{ env.TEST_IMAGE }} --help
          docker run --rm ${{ env.TEST_IMAGE }} --version

  # ── 4. [RELEASE] PUSH DOCKER IMAGE ───────────────────────────────────────────
  release-image:
    name: 🚀 [Release] Push Docker Image
    runs-on: ubuntu-latest
    needs: [setup, test]
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push multi-arch image (amd64 + arm64)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_NAME }}:${{ needs.setup.outputs.version }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 5. [RELEASE] RELEASE NOTES ───────────────────────────────────────────────
  release-notes:
    name: 📝 [Release] Release Notes
    runs-on: ubuntu-latest
    needs: [setup, release-image]
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    outputs:
      commits: ${{ steps.collect.outputs.commits }}
      date:    ${{ steps.collect.outputs.date }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect commits since last release
        id: collect
        run: |
          DATE=$(date +%Y-%m-%d)
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "Latest tag found: ${LATEST_TAG}"

          if [ -z "$LATEST_TAG" ]; then
            COMMITS=$(git log --pretty=format:"* %s (%h)" --no-merges)
          else
            COMMITS=$(git log ${LATEST_TAG}..HEAD --pretty=format:"* %s (%h)" --no-merges)
          fi

          if [ -z "$COMMITS" ]; then
            COMMITS="* Monthly rebuild with latest dependencies"
          fi

          {
            echo "commits<<EOF"
            echo "$COMMITS"
            echo "EOF"
          } >> $GITHUB_OUTPUT
          echo "date=${DATE}" >> $GITHUB_OUTPUT

          echo "Commits since ${LATEST_TAG}:"
          echo "$COMMITS"

      - name: Update README.md with release notes
        env:
          VERSION:    ${{ needs.setup.outputs.version }}
          DATE:       ${{ steps.collect.outputs.date }}
          COMMITS:    ${{ steps.collect.outputs.commits }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
        run: |
          python3 << 'PYEOF'
          import re, os

          version = os.environ['VERSION']
          date    = os.environ['DATE']
          commits = os.environ['COMMITS']
          image   = os.environ['IMAGE_NAME']

          block = (
              f"<!-- RELEASE_NOTES_START -->\n"
              f"### {version} — {date}\n\n"
              f"**Changes since last release:**\n"
              f"{commits}\n\n"
              f"**Docker Image:** `{image}:{version}`\n"
              f"<!-- RELEASE_NOTES_END -->"
          )

          with open('README.md', 'r') as f:
              content = f.read()

          updated = re.sub(
              r'<!-- RELEASE_NOTES_START -->.*?<!-- RELEASE_NOTES_END -->',
              block,
              content,
              flags=re.DOTALL
          )

          with open('README.md', 'w') as f:
              f.write(updated)

          print(f'✅ README updated for {version}')
          PYEOF
          tail -20 README.md

      - name: Commit and push README
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet && echo "No README changes" || {
            git commit -m "docs: update release notes for ${{ needs.setup.outputs.version }} [skip ci]"
            git push
          }

  # ── 6. [RELEASE] GITHUB PACKAGE ──────────────────────────────────────────────
  release-package:
    name: 📦 [Release] GitHub Package
    runs-on: ubuntu-latest
    needs: [setup, release-notes]
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.setup.outputs.version }}
          name: Release ${{ needs.setup.outputs.version }}
          body: |
            ## YAML Validator ${{ needs.setup.outputs.version }}

            ### Docker Images
            - `${{ env.IMAGE_NAME }}:${{ needs.setup.outputs.version }}`
            - `${{ env.IMAGE_NAME }}:latest`

            ### Changes
            ${{ needs.release-notes.outputs.commits }}

            ### Features
            - YAML syntax validation
            - Linting with yamllint
            - Security scanning with Checkov
            - Multi-file & directory scanning
            - Cross-platform (amd64/arm64)

            ### Quick Start
            ```bash
            # One-time install
            echo 'alias ytest="docker run --rm -v \"$(pwd):/data\" ${{ env.IMAGE_NAME }}"' >> ~/.bashrc && source ~/.bashrc

            ytest myfile.yaml       # single file
            ytest ./configs/        # entire directory
            ytest a.yaml b.yaml     # multiple files
            ```
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}

  # ── 7. SUMMARY ───────────────────────────────────────────────────────────────
  summary:
    name: 📊 Summary
    runs-on: ubuntu-latest
    needs: [setup, build, test, release-image, release-notes, release-package]
    if: always()
    steps:
      - name: Write job summary
        run: |
          echo "## 🐳 YAML Validator Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|---|:---:|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔧 Setup | ${{ needs.setup.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🐳 Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Test  | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🚀 Push Image | ${{ needs.release-image.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📝 Release Notes | ${{ needs.release-notes.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 GitHub Package | ${{ needs.release-package.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ needs.setup.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.IMAGE_NAME }}:${{ needs.setup.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
